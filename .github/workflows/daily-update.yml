name: Daily Price Update

on:
  schedule:
    - cron: '0 14 * * *'  # Daily at 2 PM UTC (morning US time)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run price update
        run: python scripts/update-prices.py --apply

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet data.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "Auto-update: oil prices and date (Day $(python3 -c 'from datetime import datetime, timezone; print(max(1, (datetime.now(timezone.utc) - datetime(2026,2,28,tzinfo=timezone.utc)).days + 1))'))"
          git push
